<div class="rounded-lg border border-zinc-800 bg-zinc-900 p-6 shadow-lg">
  <h2 class="text-2xl font-semibold mb-6 text-white">Create New Shipment</h2>

  <form [formGroup]="shipmentForm" (ngSubmit)="createShipment()" class="space-y-4">
    <div class="space-y-2">
      <label class="text-sm font-medium text-zinc-200">Origin</label>
      <input
        type="text"
        formControlName="origin"
        placeholder="e.g., New York, NY"
        class="flex h-10 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-white placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-600"
        [class.border-red-500]="hasError('origin')"
      />
      @if (hasError('origin')) {
        <p class="text-xs text-red-400">
          {{ getErrorMessage('origin') }}
        </p>
      }
    </div>

    <div class="space-y-2">
      <label class="text-sm font-medium text-zinc-200">Destination</label>
      <input
        type="text"
        formControlName="destination"
        placeholder="e.g., Los Angeles, CA"
        class="flex h-10 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-white placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-600"
        [class.border-red-500]="hasError('destination')"
      />
      @if (hasError('destination')) {
        <p class="text-xs text-red-400">
          {{ getErrorMessage('destination') }}
        </p>
      }
    </div>

    <div class="space-y-2">
      <label class="text-sm font-medium text-zinc-200">Estimated Delivery</label>
      <input
        type="text"
        formControlName="estimatedDelivery"
        placeholder="e.g., 3-5 business days"
        class="flex h-10 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-white placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-600"
      />
    </div>

    <button
      type="submit"
      [disabled]="isSubmitting()"
      class="inline-flex h-10 w-full items-center justify-center rounded-md bg-white px-4 py-2 text-sm font-medium text-black hover:bg-zinc-200 focus:outline-none focus:ring-2 focus:ring-zinc-600 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      {{ isSubmitting() ? 'Creating...' : 'Create Shipment' }}
    </button>
  </form>
</div>
