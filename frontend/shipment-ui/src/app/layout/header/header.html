<header class="sticky top-0 z-50 w-full border-b border-zinc-800 bg-zinc-900 backdrop-blur">
  <div class="container mx-auto flex h-16 items-center justify-between px-4">
    <div class="flex items-center gap-2">
      <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
        />
      </svg>
      <h1 class="text-xl font-bold text-white">{{ title }}</h1>
    </div>
    <div
      class="flex items-center gap-2 rounded-full border px-3 py-1.5 text-sm"
      [ngClass]="
        isConnected() ? 'border-green-500/50 bg-green-500/10' : 'border-red-500/50 bg-red-500/10'
      "
    >
      <span
        class="relative inline-flex h-2 w-2 rounded-full"
        [ngClass]="isConnected() ? 'bg-green-500 animate-pulse-slow' : 'bg-red-500'"
      ></span>
      <span [ngClass]="isConnected() ? 'text-green-400' : 'text-red-400'">
        {{ isConnected() ? 'Connected' : 'Disconnected' }}
      </span>
    </div>
  </div>
</header>
